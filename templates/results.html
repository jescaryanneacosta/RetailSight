<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RetailSight Analytics</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="sidebar">
      <h3>Configuration</h3>
      <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
          <label for="forecast_days"
            >Forecast Horizon:
            <span id="slider_val" style="font-weight: 700; color: #ff4b4b"
              >{{ current_days }} </span
            >Days
          </label>
          <input
            type="range"
            id="forecast_days"
            name="forecast_days"
            min="7"
            max="90"
            value="{{ current_days }}"
            oninput="
              document.getElementById('slider_val').innerText = this.value
            "
            style="width: 100%; cursor: pointer; margin-top: 0.5rem"
          />
        </div>
        <div class="form-group">
          <label for="file">Upload New Dataset</label>
          <input type="file" id="file" name="file" accept=".csv" required />
        </div>
        <button type="submit" style="width: 100%">Generate Forecast</button>
      </form>
    </div>

    <div class="main-content">
      <h1>RetailSight: Predictive Inventory Analytics</h1>
      <p class="description">
        Upload your historical sales data to generate an inventory restocking
        forecast.
      </p>

      <div class="metric-card">
        <div class="metric-label">
          Total Items Needed (Next {{ current_days }} Days)
        </div>
        <div class="metric-value">{{ total_items }}</div>
      </div>
      <div style="margin-bottom: 2rem; display: flex; gap: 1rem">
        <a
          href="{{ csv_href }}"
          download="inventory_forecast.csv"
          style="text-decoration: none"
        >
          <button
            type="button"
            style="
              background-color: #31333f;
              color: white;
              border-color: #31333f;
            "
          >
            📥 Download CSV
          </button>
        </a>
      </div>
      <div
        style="
          margin-bottom: 2.5rem;
          background: #fff;
          padding: 1rem;
          border: 1px solid #e6e9ef;
          border-radius: 0.5rem;
        "
      >
        <h3 style="margin-bottom: 1rem; font-weight: 600">
          Inventory Demand Forecast
        </h3>
        {{ chart|safe }}
      </div>

      <h3 style="margin-bottom: 1rem; font-weight: 600">Restocking Schedule</h3>
      <div style="overflow-x: auto">{{ tables|safe }}</div>
    </div>
  </body>
</html>
